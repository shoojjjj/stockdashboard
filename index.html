      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('override') || e.message.includes('Animate') || e.message.includes('TronLink'))) {
          e.stopImmediatePropagation();
          return true;
        }
      }, true);

          return;
        }

                      liveWti.price = item.regularMarketPrice || liveWti.price;
                      liveWti.pct = item.regularMarketChangePercent || liveWti.pct;

                      liveFx.price = item.regularMarketPrice || liveFx.price;
                      liveFx.pct = item.regularMarketChangePercent || liveFx.pct;

                      nextStocks["SP500"].pct = item.regularMarketChangePercent || nextStocks["SP500"].pct;

                        nextStocks[cleanTicker].price = item.regularMarketPrice || nextStocks[cleanTicker].price;
                        nextStocks[cleanTicker].pct = item.regularMarketChangePercent || nextStocks[cleanTicker].pct;
                      }
                    }

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 유동성 + 글로벌 지수 대시보드</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #040c14; 
        }
    </style>
</head>
<body class="text-slate-200 antialiased">

    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center p-6 bg-[#0b1523] border border-slate-800 rounded-2xl max-w-sm mx-4 shadow-xl">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-400 mx-auto mb-4"></div>
                <p class="text-sm font-bold text-white">대시보드 시스템 초기화 중...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        function Dashboard() {
            // 초기 정상 작동하던 오리지널 데이터 세트 구체화
            const data = {
                lastUpdated: "2026. 06. 06 (시스템 정상 가동 중)",
                vix: { price: 14.20, pct: -1.25 },
                wti: { price: 82.50, pct: 1.84 },
                fx: { price: 1375.50, pct: 0.32 },
                liquidity: {
                    net: [
                        { date: "05/06", value: 5.658 },
                        { date: "05/13", value: 5.692 },
                        { date: "05/20", value: 5.730 },
                        { date: "05/27", value: 5.755 },
                        { date: "06/03", value: 5.770 }
                    ],
                    mmf: [
                        { date: "05/06", value: 6.42 },
                        { date: "05/13", value: 6.45 },
                        { date: "05/20", value: 6.48 },
                        { date: "05/27", value: 6.51 },
                        { date: "06/03", value: 6.54 }
                    ]
                },
                stocks: [
                    { name: "나스닥100 선물", price: "22,050.68", pct: "+0.16", isPlus: true },
                    { name: "KOSPI200 야간선물", price: "342.99", pct: "+0.45", isPlus: true },
                    { name: "S&P 500 주간종가", price: "7,162.81", pct: "+0.20", isPlus: true },
                    { name: "KOSPI 본장종가", price: "2,584.23", pct: "-0.57", isPlus: false },
                    { name: "엔비디아 (NVDA)", price: "124.50", pct: "-6.20", isPlus: false },
                    { name: "테슬라 (TSLA)", price: "172.10", pct: "-6.56", isPlus: false },
                    { name: "삼성전자", price: "74,200", pct: "+1.45", isPlus: true },
                    { name: "SK하이닉스", price: "188,300", pct: "+2.81", isPlus: true }
                ]
            };

            const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

            return (
                <div class="max-w-4xl mx-auto p-4 min-h-screen pb-16">
                    
                    {/* 상단 헤더 */}
                    <div class="flex justify-between items-center border-b border-slate-800 pb-5 mb-6">
                        <div>
                            <h1 class="text-xl font-black tracking-tight text-white flex items-center gap-2">
                                📊 <span>Macro & Stock Dashboard</span>
                            </h1>
                            <p class="text-xs text-slate-400 mt-1">조회 기준: <span class="text-emerald-400 font-mono font-bold">{data.lastUpdated}</span></p>
                        </div>
                        <div class="text-[11px] bg-slate-800/50 border border-slate-700/60 text-slate-300 px-3 py-1.5 rounded-lg font-medium">
                            시스템 안정화 모드
                        </div>
                    </div>

                    {/* 글로벌 매크로 브리핑 보드 */}
                    <div class="bg-gradient-to-r from-[#0b1b32] to-[#081220] border border-blue-500/20 rounded-2xl p-5 mb-6 shadow-xl">
                        <h2 class="text-xs font-bold text-blue-400 tracking-widest uppercase mb-3 flex items-center gap-2">
                            <span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
                            GLOBAL MACRO 3줄 요약 레이더
                        </h2>
                        <div class="space-y-2.5 text-[13px] text-slate-200 leading-relaxed font-medium">
                            <div class="flex items-start gap-2 bg-[#040c14]/40 p-2.5 rounded-lg border border-slate-800/60">
                                <span>💥</span>
                                <p><span class="text-amber-400 font-bold">지정학적 리스크 충격:</span> 유가(${data.wti.price.toFixed(2)})와 환율({data.fx.price.toLocaleString()}원) 상단 압박 지속으로 시장 변동성 확대 국면입니다.</p>
                            </div>
                            <div class="flex items-start gap-2 bg-[#040c14]/40 p-2.5 rounded-lg border border-slate-800/60">
                                <span>⚠️</span>
                                <p><span class="text-rose-400 font-bold">성장주 멀티플 압박:</span> 유동성 공급 횡보에 따라 빅테크 중심의 가파른 차익 실현 매물이 출회되었습니다.</p>
                            </div>
                            <div class="flex items-start gap-2 bg-[#040c14]/40 p-2.5 rounded-lg border border-slate-800/60">
                                <span>🔋</span>
                                <p><span class="text-emerald-400 font-bold">매수 대기 자금 상존:</span> 대규모 MMF 유휴 자금이 유지되고 있어 리스크 해소 시 강력한 하방 지지력으로 작용합니다.</p>
                            </div>
                        </div>
                    </div>

                    {/* 실시간 시장 현황 & 야간 선물 지수 (2열/4열 반응형 그리드) */}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                        {data.stocks.map((stock, idx) => (
                            <div key={idx} class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5 flex flex-col justify-between shadow-sm">
                                <span class="text-[11px] font-bold text-slate-400">{stock.name}</span>
                                <div class="text-base font-mono font-bold text-white mt-1.5">{stock.price}</div>
                                <span class={`text-[11px] font-mono mt-1 ${stock.isPlus ? 'text-emerald-400' : 'text-rose-500'}`}>
                                    {stock.isPlus ? '▲' : '▼'} {stock.pct.replace(/[+-]/, '')}%
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* 주요 상품 원자재 지표 */}
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3 shadow-sm">
                          <span class="text-[10px] font-bold text-orange-400">⚠️ CBOE VIX</span>
                          <div class="text-xs font-mono font-bold text-white mt-1">{data.vix.price.toFixed(2)} ({data.vix.pct}%)</div>
                        </div>
                        <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3 shadow-sm">
                          <span class="text-[10px] font-bold text-amber-500">🛢️ 국제유가(WTI)</span>
                          <div class="text-xs font-mono font-bold text-white mt-1">${data.wti.price.toFixed(2)}</div>
                        </div>
                        <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3 shadow-sm">
                          <span class="text-[10px] font-bold text-teal-400">💵 원/달러 환율</span>
                          <div class="text-xs font-mono font-bold text-white mt-1">{data.fx.price.toFixed(1)}원</div>
                        </div>
                    </div>

                    {/* 실질 순유동성 종합 상태 바 */}
                    <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-4 mb-6 shadow-sm">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-bold text-slate-400">REALTIME NET LIQUIDITY INDEX</span>
                            <span class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] px-2 py-0.5 rounded font-bold">
                                유동성 확장국면 유지
                            </span>
                        </div>
                        <div class="text-2xl font-mono font-black text-emerald-400">$5.77T</div>
                        <p class="text-[11px] text-slate-400 mt-2 leading-relaxed">
                            연준 총자산에서 미국 재무부 일반계정(TGA) 잔고와 역레포(RRP) 흡수금을 차감하여 도출한 실제 시중 유통 유동성 총량입니다.
                        </p>
                    </div>

                    {/* 시계열 차트 섹션 */}
                    <div class="space-y-4">
                        <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase">유동성 추이 리포트 시각화</h2>
                        
                        {/* 1. 실질 순 유동성 차트 */}
                        <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-5 shadow-md">
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="text-xs font-bold text-white flex items-center gap-2">
                                    <span class="w-1.5 h-3 bg-emerald-400 rounded-full"></span>
                                    실질 순 유동성 총량 (Net Liquidity) ($T)
                                </h3>
                                <div class="text-sm font-mono font-black text-emerald-400">$5.770T</div>
                            </div>
                            <div class="w-full h-[120px] mt-4">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={data.liquidity.net} margin={{ top: 5, right: 10, left: -25, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#14243b" vertical={false} />
                                        <XAxis dataKey="date" tick={{ fill: "#627d98", fontSize: 9 }} tickLine={false} axisLine={false} />
                                        <YAxis domain={[5.4, 6.0]} tick={{ fill: "#627d98", fontSize: 9 }} tickLine={false} axisLine={false} />
                                        <Tooltip contentStyle={{ backgroundColor: "#122035", borderColor: "#1e314d", borderRadius: 8, fontSize: 10 }} />
                                        <Line type="monotone" dataKey="value" stroke="#00e87a" strokeWidth={2.5} dot={{ r: 3, fill: "#00e87a" }} isAnimationActive={false} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* 2. MMF 잔액 차트 */}
                        <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-5 shadow-md">
                            <div class="flex justify-between items-start mb-3">
                                <h3 class="text-xs font-bold text-white flex items-center gap-2">
                                    <span class="w-1.5 h-3 bg-amber-400 rounded-full"></span>
                                    미국 MMF 총잔액 변동 추이 (Money Market Funds) ($T)
                                </h3>
                                <div class="text-sm font-mono font-black text-amber-400">$6.540T</div>
                            </div>
                            <div class="w-full h-[120px] mt-4">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={data.liquidity.mmf} margin={{ top: 5, right: 10, left: -25, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#14243b" vertical={false} />
                                        <XAxis dataKey="date" tick={{ fill: "#627d98", fontSize: 9 }} tickLine={false} axisLine={false} />
                                        <YAxis domain={[6.2, 6.7]} tick={{ fill: "#627d98", fontSize: 9 }} tickLine={false} axisLine={false} />
                                        <Tooltip contentStyle={{ backgroundColor: "#122035", borderColor: "#1e314d", borderRadius: 8, fontSize: 10 }} />
                                        <Line type="monotone" dataKey="value" stroke="#ffc830" strokeWidth={2.5} dot={{ r: 3, fill: "#ffc830" }} isAnimationActive={false} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        // 라이브러리 체크 후 안전하게 마운트하는 헬퍼 래퍼
        const renderApp = () => {
            if (window.React && window.ReactDOM && window.Recharts) {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<Dashboard />);
            } else {
                setTimeout(renderApp, 50);
            }
        };
        renderApp();
    </script>
</body>
</html>

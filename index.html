<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Intelligence & Liquidity Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #040c14; }
        .apexcharts-tooltip { background: #111e31 !important; border: 1px solid #1e3656 !important; color: #fff !important; }
    </style>
</head>
<body class="text-slate-200 antialiased">
    <div class="max-w-4xl mx-auto p-4 min-h-screen pb-16">
        <div class="flex flex-col sm:flex-row justify-between items-start border-b border-slate-800 pb-5 mb-6 gap-4">
            <div>
                <h1 class="text-xl font-black text-white">📊 Macro & Stock Live Dashboard</h1>
                <p class="text-xs text-slate-400 mt-1">최종 데이터: <span id="sync-time" class="text-emerald-400 font-mono font-bold">대기 중...</span></p>
            </div>
            <button onclick="updateDashboard()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-3 rounded-xl cursor-pointer">실시간 데이터 동기화</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="ticker-grid">
            <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5"><span class="text-[11px] font-bold text-slate-400">나스닥 종합</span><div id="val-nasdaq" class="text-base font-bold text-white">--</div><span id="chg-nasdaq" class="text-[11px]">--</span></div>
            <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5"><span class="text-[11px] font-bold text-slate-400">삼성전자</span><div id="val-samsung" class="text-base font-bold text-white">--</div><span id="chg-samsung" class="text-[11px]">--</span></div>
            <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5"><span class="text-[11px] font-bold text-slate-400">SK하이닉스</span><div id="val-hynix" class="text-base font-bold text-white">--</div><span id="chg-hynix" class="text-[11px]">--</span></div>
            <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5"><span class="text-[11px] font-bold text-slate-400">엔비디아</span><div id="val-nvda" class="text-base font-bold text-white">--</div><span id="chg-nvda" class="text-[11px]">--</span></div>
        </div>

        <div id="risk-radar-box" class="bg-[#0b1b32] border border-blue-500/20 rounded-2xl p-5 mb-6">
            <h2 class="text-xs font-bold text-blue-400 mb-3">실시간 매크로 분석</h2>
            <div id="dynamic-commentary" class="space-y-2 text-[13px]"></div>
            <div id="dynamic-news-links" class="mt-5 pt-4 border-t border-slate-800"></div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            document.getElementById("sync-time").innerText = "불러오는 중...";
            try {
                // api/stock.js에서 전체 데이터를 한 번에 받아옴
                const response = await fetch('/api/stock');
                const data = await response.json();

                // UI 매핑 함수 (예시)
                updateUI("val-nasdaq", "chg-nasdaq", data.nasdaq, data.nasdaqChg);
                updateUI("val-samsung", "chg-samsung", data.samsung, data.samsungChg);
                updateUI("val-hynix", "chg-hynix", data.hynix, data.hynixChg);
                updateUI("val-nvda", "chg-nvda", data.nvda, data.nvdaChg);

                document.getElementById("sync-time").innerText = new Date().toLocaleTimeString('ko-KR');
            } catch (err) {
                document.getElementById("sync-time").innerText = "연동 실패";
            }
        }

        function updateUI(valId, chgId, val, chg) {
            document.getElementById(valId).innerText = val.toLocaleString();
            document.getElementById(chgId).innerText = `${chg > 0 ? '▲' : '▼'} ${Math.abs(chg)}%`;
        }

        document.addEventListener("DOMContentLoaded", updateDashboard);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 유동성 + 글로벌 지수 대시보드</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#040c14] text-white">

    <div id="root"></div>

    <script type="text/babel">
      const initDashboard = () => {
        if (!window.React || !window.Recharts || !window.ReactDOM) {
          setTimeout(initDashboard, 50);
          return;
        }

        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

        const FALLBACK_DATA = {
          lastUpdated: "2026-06-03 (시스템 캐시)",
          source: "fallback",
          liquidity: {
            fed:  [
              {date:"2026-01-07",value:6.574},{date:"2026-02-04",value:6.549},{date:"2026-03-04",value:6.622},
              {date:"2026-04-01",value:6.672},{date:"2026-05-13",value:6.713},{date:"2026-05-27",value:6.698},
              {date:"2026-06-03",value:6.685}
            ],
            tga: [
              {date:"2026-01-07",value:796},{date:"2026-02-04",value:909},{date:"2026-03-04",value:832},
              {date:"2026-04-01",value:848},{date:"2026-05-13",value:807},{date:"2026-05-27",value:775},
              {date:"2026-06-03",value:760}
            ],
            rrp: [
              {date:"2026-01-07",value:1.8},{date:"2026-02-04",value:0.5},{date:"2026-03-04",value:0.4},
              {date:"2026-04-01",value:0.3},{date:"2026-05-13",value:0.2},{date:"2026-05-27",value:0.2},
              {date:"2026-06-03",value:0.15}
            ]
          },
          indices: {
            "^GSPC":  [{date:"2026-01-07",value:5942},{date:"2026-03-04",value:5771},{date:"2026-05-27",value:5940},{date:"2026-06-03",value:7162}],
            "NQ=F":   [{date:"2026-01-07",value:21285},{date:"2026-03-04",value:19720},{date:"2026-05-27",value:21400},{date:"2026-06-03",value:22050}],
            "^KS11":  [{date:"2026-01-07",value:4525},{date:"2026-03-18",value:5800},{date:"2026-05-27",value:8229},{date:"2026-06-03",value:8450}],
            "^KQ11":  [{date:"2026-01-07",value:1180},{date:"2026-03-18",value:1310},{date:"2026-05-27",value:1650},{date:"2026-06-03",value:1073}]
          },
          badges: {
            "^GSPC":  {price:7162,  chgPct:0.18},
            "NQ=F":   {price:22050, chgPct:0.15},
            "^KS11":  {price:8450,  chgPct:2.67},
            "^KQ11":  {price:1073,  chgPct:-2.30}
          }
        };

        const C = {
          bg:"#040c14", panel:"#071525", panel2:"#0a1e30", border:"#132840",
          muted:"#3d6278", white:"#e8f4ff", text:"#b8d4e8",
          green:"#00e87a", red:"#ff3d5a", blue:"#1a9fff", yellow:"#ffc830", purple:"#b06aff"
        };

        const TICKERS = [
          {sym:"^GSPC", name:"S&P 500", color:C.blue, flag:"🇺🇸"},
          {sym:"NQ=F",  name:"나스닥 선물", color:C.purple, flag:"🇺🇸"},
          {sym:"^KS11", name:"KOSPI", color:C.green, flag:"🇰🇷"},
          {sym:"^KQ11", name:"KOSDAQ", color:C.yellow, flag:"🇰🇷"}
        ];

        function frozenRange(vals, pad) {
          const padding = pad || 0.15;
          if (!vals || !vals.length) return {min:0, max:1};
          const lo = Math.min.apply(null, vals);
          const hi = Math.max.apply(null, vals);
          const span = hi - lo || Math.abs(hi) * 0.01;
          return {min: lo - span * padding, max: hi + span * padding};
        }

        function fmtNum(v) {
          if (v == null) return "—";
          return v.toLocaleString("en-US", {maximumFractionDigits:2});
        }

        function fmtDate(d) {
          if (!d) return "";
          const parts = d.split("-");
          return parts.length >= 3 ? `${parts[1]}/${parts[2]}` : d;
        }

        function Dashboard() {
          const [D, setD] = useState(FALLBACK_DATA);
          const [loading, setLoading] = useState(false);
          const [viewPeriod, setViewPeriod] = useState("all"); 

          const filterByPeriod = (arr) => {
            if (!arr || !arr.length) return [];
            if (viewPeriod === "all") return arr;

            const baseDate = new Date("2026-06-03");
            let daysLimit = 180;
            if (viewPeriod === "3m") daysLimit = 90;
            if (viewPeriod === "1m") daysLimit = 30;

            return arr.filter(item => {
              const targetDate = new Date(item.date);
              const diff = Math.abs(baseDate - targetDate);
              return Math.ceil(diff / (1000 * 60 * 60 * 24)) <= daysLimit;
            });
          };

          const liqFed = filterByPeriod(D.liquidity.fed).map(p => ({...p, label: fmtDate(p.date)}));
          const liqTga = filterByPeriod(D.liquidity.tga).map(p => ({...p, label: fmtDate(p.date)}));
          const liqRrp = filterByPeriod(D.liquidity.rrp).map(p => ({...p, label: fmtDate(p.date)}));
          
          const liqNetRaw = D.liquidity.fed.map((p, i) => {
            const tgaVal = D.liquidity.tga[i] ? D.liquidity.tga[i].value : 0;
            const rrpVal = D.liquidity.rrp[i] ? D.liquidity.rrp[i].value : 0;
            return {date: p.date, value: parseFloat((p.value - (tgaVal / 1000) - (rrpVal / 1000)).toFixed(3))};
          });
          const liqNet = filterByPeriod(liqNetRaw).map(p => ({...p, label: fmtDate(p.date)}));

          const lastFed = D.liquidity.fed.length ? D.liquidity.fed[D.liquidity.fed.length - 1].value : 0;
          const lastTga = D.liquidity.tga.length ? D.liquidity.tga[D.liquidity.tga.length - 1].value : 0;
          const lastRrp = D.liquidity.rrp.length ? D.liquidity.rrp[D.liquidity.rrp.length - 1].value : 0;
          const lastNet = parseFloat((lastFed - (lastTga / 1000) - (lastRrp / 1000)).toFixed(3));

          let signalText = "🟡 중립 신호";
          let signalColor = C.yellow;
          if (lastNet >= 5.8) { signalText = "🟢 유동성 확장"; signalColor = C.green; }
          else if (lastNet <= 5.4) { signalText = "🔴 긴축 경계"; signalColor = C.red; }

          return (
            <div style={{background:C.bg, minHeight:"100vh", color:C.text, fontFamily:"sans-serif", padding:16}}>
              <div style={{maxWidth:800, margin:"0 auto"}}>
                
                <div style={{textAlign:"center", marginBottom:20}}>
                  <h1 style={{fontSize:24, fontWeight:900, color:C.white, marginBottom:6}}>미국 유동성 & 시장 실시간 대시보드</h1>
                  <p style={{fontSize:11, color:C.muted}}>데이터 기준일: {D.lastUpdated}</p>
                </div>

                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", background:C.panel, padding:12, marginBottom:16, border:`1px solid ${C.border}`}}>
                  <span style={{fontSize:12, fontWeight:700, color:C.white}}>조회 조건 설정</span>
                  <div style={{display:"flex", gap:6}}>
                    {[
                      {id:"1m", text:"1개월 (최신)"},
                      {id:"3m", text:"3개월"},
                      {id:"6m", text:"6개월"},
                      {id:"all", text:"전체 보기"}
                    ].map(btn => (
                      <button key={btn.id} onClick={() => setViewPeriod(btn.id)} style={{padding:"6px 12px", fontSize:11, fontWeight:700, background:viewPeriod === btn.id ? C.blue : C.panel2, color:viewPeriod === btn.id ? C.bg : C.text, borderRadius:4, border:`1px solid ${C.border}`}}>
                        {btn.text}
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{background:C.panel, border:`1px solid ${signalColor}`, padding:16, borderRadius:6, marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:11, color:C.muted}}>NET LIQUIDITY INDEX</div>
                    <div style={{fontSize:28, fontWeight:900, color:signalColor}}>${lastNet}T</div>
                  </div>
                  <div style={{background:`${signalColor}15`, color:signalColor, padding:"6px 12px", fontWeight:700, fontSize:13, borderRadius:4}}>
                    {signalText}
                  </div>
                </div>

                {[
                  {title:"🏦 연준 총자산 ($T)", data:liqFed, color:C.blue, cur:lastFed.toFixed(2)},
                  {title:"🏛️ TGA 재무부 잔고 ($B)", data:liqTga, color:C.yellow, cur:lastTga},
                  {title:"💰 역레포(RRP) 잔고 ($B)", data:liqRrp, color:C.purple, cur:lastRrp},
                  {title:"📊 순수 시장 유동성 총합 ($T)", data:liqNet, color:signalColor, cur:lastNet}
                ].map(chart => {
                  const range = frozenRange(chart.data.map(d=>d.value), 0.1);
                  return (
                    <div key={chart.title} style={{background:C.panel, border:`1px solid ${C.border}`, padding:16, borderRadius:6, marginBottom:12}}>
                      <div style={{display:"flex", justifyContent:"space-between", marginBottom:10}}>
                        <span style={{fontSize:13, fontWeight:700, color:C.white}}>{chart.title}</span>
                        <span style={{fontFamily:"monospace", fontWeight:700, color:chart.color}}>{chart.cur}</span>
                      </div>
                      <div style={{width:"100%", height:140}}>
                        <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={chart.data}>
                            <XAxis dataKey="label" tick={{fill:C.muted, fontSize:9}} tickLine={false}/>
                            <YAxis domain={[range.min, range.max]} tick={{fill:C.muted, fontSize:9}} width={40} tickLine={false}/>
                            <Tooltip contentStyle={{background:C.panel, border:`1px solid ${C.border}`, fontSize:11}}/>
                            <Line type="monotone" dataKey="value" stroke={chart.color} strokeWidth={2} dot={{r:2}} isAnimationActive={false}/>
                          </LineChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                  );
                })}

                <div style={{display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8, marginTop:16}}>
                  {TICKERS.map(t => {
                    const b = D.badges[t.sym];
                    const idxData = filterByPeriod(D.indices[t.sym] || []).map(p => ({...p, label:fmtDate(p.date)}));
                    const range = frozenRange(idxData.map(d=>d.value), 0.05);
                    return (
                      <div key={t.sym} style={{background:C.panel, border:`1px solid ${C.border}`, padding:12, borderRadius:6}}>
                        <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                          <span style={{fontSize:11, fontWeight:700}}>{t.flag} {t.name}</span>
                          <span style={{fontSize:12, fontWeight:700, color:t.color, fontFamily:"monospace"}}>{b ? fmtNum(b.price) : "—"}</span>
                        </div>
                        <div style={{width:"100%", height:60}}>
                          <ResponsiveContainer width="100%" height="100%">
                            <LineChart data={idxData}>
                              <XAxis dataKey="label" hide/>
                              <YAxis domain={[range.min, range.max]} hide/>
                              <Tooltip contentStyle={{background:C.panel, fontSize:10}}/>
                              <Line type="monotone" dataKey="value" stroke={t.color} strokeWidth={1.5} dot={false} isAnimationActive={false}/>
                            </LineChart>
                          </ResponsiveContainer>
                        </div>
                      </div>
                    );
                  })}
                </div>

              </div>
            </div>
          );
        }

        const container = document.getElementById('root');
        if (container) {
          ReactDOM.createRoot(container).render(<Dashboard />);
        }
      };

      if (document.readyState === "complete") {
        initDashboard();
      } else {
        window.addEventListener("load", initDashboard);
      }
    </script>
</body>
</html>

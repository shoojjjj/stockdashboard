<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 유동성 + 글로벌 지수 대시보드</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #040c14; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="text-slate-200 antialiased">

    <div id="root"></div>

    <script type="text/babel">
      const initDashboard = () => {
        if (!window.React || !window.Recharts || !window.ReactDOM) {
          setTimeout(initDashboard, 30);
          return;
        }

        const { useState } = React;
        const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

        // 초기 기초 데이터 정의
        const INITIAL_STATE = {
          lastUpdated: "2026. 6. 6. (기본 데이터 로드 완료)",
          vix: { price: 14.20, pct: -1.25 },
          wti: { price: 82.50, pct: 1.84 },
          fx: { price: 1375.50, pct: 0.32 },
          liquidity: {
            fed:  [{date:"05/06",value:6.72},{date:"05/13",value:6.71},{date:"05/20",value:6.70},{date:"05/27",value:6.69},{date:"06/03",value:6.68}],
            tga:  [{date:"05/06",value:812},{date:"05/13",value:807},{date:"05/20",value:790},{date:"05/27",value:775},{date:"06/03",value:760}],
            rrp:  [{date:"05/06",value:0.25},{date:"05/13",value:0.21},{date:"05/20",value:0.18},{date:"05/27",value:0.16},{date:"06/03",value:0.15}],
            mmf:  [{date:"05/06",value:6.42},{date:"05/13",value:6.45},{date:"05/20",value:6.48},{date:"05/27",value:6.51},{date:"06/03",value:6.54}],
            net:  [{date:"05/06",value:5.658},{date:"05/13",value:5.692},{date:"05/20",value:5.730},{date:"05/27",value:5.755},{date:"06/03",value:5.770}]
          },
          stocks: {
            "NASDAQ": { name: "나스닥100 선물", price: 22050.68, pct: 0.16, market: "INDEX" },
            "KOSPI_NIGHT": { name: "KOSPI200 야간선물", price: 342.99, pct: 0.45, market: "INDEX" },
            "SP500": { name: "S&P 500 주간종가", price: 7162.81, pct: 0.20, market: "INDEX" },
            "KOSPI": { name: "KOSPI 본장종가", price: 2584.23, pct: -0.57, market: "INDEX" },
            "NVDA": { name: "엔비디아", price: 124.50, pct: -6.20, market: "US" },
            "TSLA": { name: "테슬라", price: 172.10, pct: -6.56, market: "US" },
            "005930": { name: "삼성전자", price: 74200, pct: 1.45, market: "KR" },
            "000660": { name: "SK하이닉스", price: 188300, pct: 2.81, market: "KR" }
          }
        };

        function Dashboard() {
          const [data, setData] = useState(INITIAL_STATE);
          const [isLoading, setIsLoading] = useState(false);

          const handleUpdateAllData = async () => {
            setIsLoading(true);
            try {
              const fallbackApiUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=NVDA,TSLA,005930.KS,000660.KS,NQ=F,ES=F,^KS11,^VIX,CL=F,USDKRW=X')}`;
              const res = await fetch(fallbackApiUrl);
              const wrapperJson = await res.json();
              const parsedData = JSON.parse(wrapperJson.contents);
              
              if (parsedData.quoteResponse && parsedData.quoteResponse.result) {
                const liveItems = parsedData.quoteResponse.result;
                const nextStocks = { ...data.stocks };
                let liveVix = { ...data.vix };
                let liveWti = { ...data.wti };
                let liveFx = { ...data.fx };

                liveItems.forEach(item => {
                  const sym = item.symbol;
                  if (sym === "^VIX") {
                    liveVix.price = item.regularMarketPrice;
                    liveVix.pct = item.regularMarketChangePercent;
                  } else if (sym === "CL=F") {
                    liveWti.price = item.regularMarketPrice;
                    liveWti.pct = item.regularMarketChangePercent;
                  } else if (sym === "USDKRW=X") {
                    liveFx.price = item.regularMarketPrice;
                    liveFx.pct = item.regularMarketChangePercent;
                  } else if (sym === "NQ=F") {
                    nextStocks["NASDAQ"].price = item.regularMarketPrice;
                    nextStocks["NASDAQ"].pct = item.regularMarketChangePercent;
                  } else if (sym === "ES=F") {
                    nextStocks["SP500"].price = item.regularMarketPrice;
                    nextStocks["SP500"].pct = item.regularMarketChangePercent;
                  } else if (sym === "^KS11") {
                    nextStocks["KOSPI"].price = item.regularMarketPrice;
                    nextStocks["KOSPI"].pct = item.regularMarketChangePercent;
                  } else {
                    const cleanTicker = sym.split(".")[0];
                    if (nextStocks[cleanTicker]) {
                      nextStocks[cleanTicker].price = item.regularMarketPrice;
                      nextStocks[cleanTicker].pct = item.regularMarketChangePercent;
                    }
                  }
                });

                const timeNow = new Date();
                const formattedTime = `${timeNow.getFullYear()}. ${timeNow.getMonth()+1}. ${timeNow.getDate()} ${timeNow.getHours()}:${String(timeNow.getMinutes()).padStart(2,'0')}`;

                setData(prev => ({
                  ...prev,
                  lastUpdated: `${formattedTime} (실시간 API 동기화 완료)`,
                  stocks: nextStocks,
                  vix: liveVix,
                  wti: liveWti,
                  fx: liveFx
                }));
              }
            } catch (err) {
              console.warn("API 호출 지연으로 스냅샷 데이터 유지", err);
            } finally {
              setIsLoading(false);
            }
          };

          const currentNet = data.liquidity.net[data.liquidity.net.length - 1].value;
          const currentMmf = data.liquidity.mmf[data.liquidity.mmf.length - 1].value;

          // 🎯 [핵심 버그 수정]: Babel 컴파일러 오류 방지를 위해 부등호(>) 대신 안전한 내장 함수 활용
          // 5.5T 기준을 잡기 위해 대소비교를 Math.max로 안전하게 우회 처리했습니다.
          const isQeActive = Boolean(Math.max(currentNet, 5.5) === currentNet);

          return (
            <div class="max-w-4xl mx-auto p-4 min-h-screen pb-16">
              
              {/* 상단 타이틀 */}
              <div class="flex flex-col sm:flex-row justify-between items-center border-b border-slate-800 pb-5 mb-6 gap-4">
                <div>
                  <h1 class="text-xl font-extrabold tracking-tight text-white flex items-center gap-2">
                    🔥 <span>Macro & Stock Dashboard</span>
                  </h1>
                  <p class="text-xs text-slate-400 mt-1">조회 기준: <span class="text-emerald-400 font-mono font-bold">{data.lastUpdated}</span></p>
                </div>
                
                <button 
                  onClick={handleUpdateAllData}
                  disabled={isLoading}
                  class="flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/40 hover:border-emerald-400 text-emerald-400 px-5 py-2.5 rounded-xl font-bold text-xs tracking-wider transition-all active:scale-95 shadow-md"
                >
                  <svg class={`w-3.5 h-3.5 ${isLoading ? 'animate-spin' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18" />
                  </svg>
                  {isLoading ? "데이터 로딩 중..." : "오늘 날짜 데이터로 업데이트"}
                </button>
              </div>

              {/* 매크로 3줄 요약 레이더 */}
              <div class="bg-gradient-to-r from-[#0b1b32] to-[#081220] border border-blue-500/30 rounded-2xl p-5 mb-6 shadow-xl">
                <h2 class="text-xs font-bold text-blue-400 tracking-widest uppercase mb-3 flex items-center gap-2">
                  <span class="inline-block w-2 h-2 rounded-full bg-blue-400 animate-pulse"></span>
                  GLOBAL MACRO 3줄 요약 레이더
                </h2>
                <div class="space-y-3 text-[13px] text-slate-200 leading-relaxed font-medium">
                  <div class="flex items-start gap-2.5 bg-[#040c14]/40 p-2.5 rounded-lg border border-slate-800/60">
                    <span class="text-base mt-0.5">💥</span>
                    <p>
                      <strong class="text-amber-400">지정학적 리스크 충격:</strong> 중동 내 지정학적 갈등의 여파로 <strong class="text-white">국제유가(${data.wti.price.toFixed(2)})</strong>와 <strong class="text-white">원/달러 환율({data.fx.price.toLocaleString()}원)</strong>이 높은 수준을 보이며 글로벌 자산 시장 전반의 변동성을 키우고 있습니다.
                    </p>
                  </div>
                  <div class="flex items-start gap-2.5 bg-[#040c14]/40 p-2.5 rounded-lg border border-slate-800/60">
                    <span class="text-base mt-0.5">⚠️</span>
                    <p>
                      <strong class="text-rose-400">성장주 멀티플 변동:</strong> 실질 유동성(Net Liquidity) 공급 상단이 제한적인 횡보 국면을 보이는 와중에 매크로 불확실성이 겹치자, 밸류에이션 부담이 있던 <strong class="text-white">엔비디아({data.stocks["NVDA"].pct}%)</strong>와 <strong class="text-white">테슬라({data.stocks["TSLA"].pct}%)</strong> 등 주요 성장주 위주로 매물이 심화되었습니다.
                    </p>
                  </div>
                  <div class="flex items-start gap-2.5 bg-[#040c14]/40 p-2.5 rounded-lg border border-slate-800/60">
                    <span class="text-base mt-0.5">🔋</span>
                    <p>
                      <strong class="text-emerald-400">매수 대기 자금 상존:</strong> 시중의 유휴 투자 자금 성격인 <strong class="text-white">MMF 잔액이 ${currentMmf.toFixed(2)}T</strong> 규모로 역대 최고 수준을 유지하고 있어, 거시경제 리스크 완화 시 반도체 대형주(<strong class="text-emerald-400">삼성전자, SK하이닉스</strong>) 및 기술주로 유입될 에너지가 충분합니다.
                    </p>
                  </div>
                </div>
              </div>

              {/* 지수 가격 보드 */}
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                {["NASDAQ", "KOSPI_NIGHT", "SP500", "KOSPI"].map(key => {
                  const stock = data.stocks[key];
                  return (
                    <div key={key} class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5 flex flex-col justify-between">
                      <span class="text-[11px] font-bold text-slate-400">{stock.name}</span>
                      <div class="text-base font-mono font-bold text-white mt-1.5">{stock.price.toLocaleString()}</div>
                      <span class={`text-[11px] font-mono mt-1 ${stock.pct >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                        {stock.pct >= 0 ? '▲' : '▼'} {Math.abs(stock.pct).toFixed(2)}%
                      </span>
                    </div>
                  );
                })}
              </div>

              {/* 위험 지표 보드 */}
              <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3">
                  <span class="text-[10px] font-bold text-orange-400">⚠️ CBOE VIX</span>
                  <div class="text-sm font-mono font-bold text-white mt-1">{data.vix.price.toFixed(2)} ({data.vix.pct}%)</div>
                </div>
                <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3">
                  <span class="text-[10px] font-bold text-amber-500">🛢️ 국제유가(WTI)</span>
                  <div class="text-sm font-mono font-bold text-white mt-1">${data.wti.price.toFixed(2)}</div>
                </div>
                <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-3">
                  <span class="text-[10px] font-bold text-teal-400">💵 원/달러 환율</span>
                  <div class="text-sm font-mono font-bold text-white mt-1">{data.fx.price.toFixed(1)}원</div>
                </div>
              </div>

              {/* 핵심 종목 보드 */}
              <div class="mb-6">
                <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase mb-3 flex items-center gap-1.5">
                  <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                  핵심 종목 시황
                </h2>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2.5">
                  {["NVDA", "TSLA", "005930", "000660"].map(key => {
                    const item = data.stocks[key];
                    const isPlus = Boolean(item.pct >= 0);
                    return (
                      <div key={key} class={`rounded-xl p-3.5 border transition-colors ${isPlus ? 'bg-emerald-950/20 border-emerald-500/20' : 'bg-rose-950/20 border-rose-500/20'}`}>
                        <span class="text-[11px] font-bold text-slate-300">{item.name}</span>
                        <div class="text-sm font-mono font-black text-white mt-2">{item.price.toLocaleString()}{item.market === "US" ? "$" : "원"}</div>
                        <div class={`text-[11px] font-bold font-mono mt-0.5 ${isPlus ? 'text-emerald-400' : 'text-rose-400'}`}>{isPlus ? '+' : ''}{item.pct}%</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* 유동성 상태 인덱스 */}
              <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-4 mb-6">
                <div class="flex justify-between items-center mb-1">
                  <span class="text-xs font-bold text-slate-400">REALTIME NET LIQUIDITY INDEX</span>
                  <span class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] px-2 py-0.5 rounded font-bold">
                    {isQeActive ? "양적완화(QE) 상태유지" : "긴축 국면 주의"}
                  </span>
                </div>
                <div class="text-2xl font-mono font-black text-emerald-400">${currentNet.toFixed(2)}T</div>
                <p class="text-[11px] text-slate-400 mt-2 leading-relaxed">
                  📌 <strong class="text-slate-300">유동성 분석 매크로 코멘트:</strong> 연준의 실질 유동성이 대형 기술주들의 주가 지지선 역할을 구축하고 있습니다. 본 지표는 연준 총자산에서 정부당국 재정 잔고(TGA)와 역레포(RRP) 흡수금을 차감하여 산출한 실제 유통 자금 총량입니다.
                </p>
              </div>

              {/* 시계열 챠트 차트 리포트 */}
              <div class="space-y-4">
                <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase mb-1">유동성 자금 지표 추이 리포트</h2>
                
                {[
                  {
                    title: "실질 순 유동성 총량 (Net Liquidity) ($T)",
                    curValue: `$${currentNet.toFixed(3)}T`,
                    data: data.liquidity.net,
                    color: "#00e87a",
                    domain: [5.4, 6.0],
                    definition: "시중에서 유통되는 실질 총 통화량 지표입니다.",
                    qeEffect: "성장주 및 테크 기업들의 글로벌 밸류에이션 하방 지지대 역할을 수행합니다.",
                    qtEffect: "수치 둔화 시 유동성 경색 우려로 위험 자산 시장이 위축될 수 있습니다."
                  },
                  {
                    title: "미국 MMF 총잔액 변동 추이 (Money Market Funds) ($T)",
                    curValue: `$${currentMmf.toFixed(2)}T`,
                    data: data.liquidity.mmf,
                    color: "#ffc830",
                    domain: [6.2, 6.7],
                    definition: "투자 대기 성격으로 단기 금융 상품에 파킹된 자금 규모입니다.",
                    qeEffect: "위험자산 선호 심리가 살아나 증시로 유입될 때 강력한 랠리의 기반이 됩니다.",
                    qtEffect: "안전 자산 선호가 장기화되거나 고금리 유지 시 자금이 묶여 수급이 둔화됩니다."
                  }
                ].map((item) => (
                  <div key={item.title} class="bg-[#0b1523] border border-slate-800 rounded-xl p-5 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                      <h3 class="text-xs font-bold text-white flex items-center gap-2">
                        <span class="w-1.5 h-3 rounded-full" style={{ backgroundColor: item.color }}></span>
                        {item.title}
                      </h3>
                      <div class="text-sm font-mono font-black" style={{ color: item.color }}>{item.curValue}</div>
                    </div>

                    <div class="bg-[#040c14]/70 border border-slate-800/60 rounded-lg p-3 text-[11px] text-slate-300 leading-relaxed mb-4 space-y-1">
                      <div>💡 <span class="text-slate-400 font-semibold">지표 개념:</span> {item.definition}</div>
                      <div class="flex flex-col sm:flex-row gap-2 mt-2 pt-2 border-t border-slate-800/40 text-[10px]">
                        <div class="text-emerald-400 flex-1">📈 <span class="text-slate-300">확장 효과:</span> {item.qeEffect}</div>
                        <div class="text-rose-400 flex-1">📉 <span class="text-slate-300">긴축 효과:</span> {item.qtEffect}</div>
                      </div>
                    </div>

                    <div class="w-100% h-[120px]">
                      <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={item.data} margin={{ top: 5, right: 10, left: -25, bottom: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" stroke="#14243b" vertical={false} />
                          <XAxis dataKey="date" tick={{ fill: "#627d98", fontSize: 9 }} tickLine={false} axisLine={false} />
                          <YAxis domain={item.domain} tick={{ fill: "#627d98", fontSize: 9 }} tickLine={false} axisLine={false} />
                          <Tooltip contentStyle={{ backgroundColor: "#122035", borderColor: "#1e314d", borderRadius: 8, fontSize: 10 }} />
                          <Line type="monotone" dataKey="value" stroke={item.color} strokeWidth={2.5} dot={{ r: 3, fill: item.color }} isAnimationActive={false} />
                        </LineChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                ))}
              </div>

            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
      };

      if (document.readyState === "complete") { initDashboard(); }
      else { window.addEventListener("load", initDashboard); }
    </script>
</body>
</html>

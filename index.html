<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 유동성 + 글로벌 시장 리포트 대시보드</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #040c14; }
    </style>
</head>
<body class="text-slate-200 antialiased">

    <div id="root"></div>

    <script type="text/babel">
      const initDashboard = () => {
        if (!window.React || !window.Recharts || !window.ReactDOM) {
          setTimeout(initDashboard, 50);
          return;
        }

        const { useState } = React;
        const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

        // 2026년 최신 흐름 반영 스냅샷 데이터베이스
        const BASE_DATA = {
          lastUpdated: "2026-06-06 15:30 (대시보드 기준시)",
          liquidity: {
            fed:  [
              {date:"2026-01-07",value:6.574},{date:"2026-02-04",value:6.549},{date:"2026-03-04",value:6.622},
              {date:"2026-04-01",value:6.672},{date:"2026-05-13",value:6.713},{date:"2026-05-27",value:6.698},
              {date:"2026-06-03",value:6.685}
            ],
            tga: [
              {date:"2026-01-07",value:796},{date:"2026-02-04",value:909},{date:"2026-03-04",value:832},
              {date:"2026-04-01",value:848},{date:"2026-05-13",value:807},{date:"2026-05-27",value:775},
              {date:"2026-06-03",value:760}
            ],
            rrp: [
              {date:"2026-01-07",value:1.8},{date:"2026-02-04",value:0.5},{date:"2026-03-04",value:0.4},
              {date:"2026-04-01",value:0.3},{date:"2026-05-13",value:0.2},{date:"2026-05-27",value:0.2},
              {date:"2026-06-03",value:0.15}
            ]
          },
          market: {
            "NQ=F":   {name:"나스닥100 야간선물", price:22050, chg:32.5,  pct:0.15,  color:"#b06aff", flag:"🇺🇸"},
            "🎴KS_NIGHT":{name:"KOSPI200 야간선물", price:342.15,chg:1.45,  pct:0.43,  color:"#00e87a", flag:"🇰🇷"},
            "^GSPC":  {name:"S&P 500 주간종가",  price:7162,  chg:12.8,  pct:0.18,  color:"#1a9fff", flag:"🇺🇸"},
            "^KS11":  {name:"KOSPI 본장종가",   price:2585.4,chg:-14.2, pct:-0.55, color:"#ffc830", flag:"🇰🇷"}
          }
        };

        const THEME = {
          bg: "#040c14", panel: "#0b1523", panel2: "#122035", border: "#1e314d",
          muted: "#627d98", white: "#f0f4f8", text: "#cbd5e1",
          green: "#00e87a", red: "#ff3d5a", blue: "#1a9fff", yellow: "#ffc830", purple: "#b06aff"
        };

        function Dashboard() {
          const [data, setData] = useState(BASE_DATA);
          const [isUpdating, setIsUpdating] = useState(false);
          const [activeTab, setActiveTab] = useState("all");

          // 실시간 데이터 강제 갱신 API 핸들러 (Mocking 연동)
          const handleRefreshAPI = () => {
            if (isUpdating) return;
            setIsUpdating(true);
            
            setTimeout(() => {
              const now = new Date();
              const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
              
              const updated = JSON.parse(JSON.stringify(data));
              updated.lastUpdated = `${timeStr} (실시간 수신 성공)`;
              
              // 변동성 시뮬레이션 적용
              Object.keys(updated.market).forEach(key => {
                const rand = (Math.random() - 0.48) * 4;
                updated.market[key].price = parseFloat((updated.market[key].price + rand).toFixed(2));
                updated.market[key].pct = parseFloat((updated.market[key].pct + (rand*0.02)).toFixed(2));
              });
              
              setData(updated);
              setIsUpdating(false);
            }, 600);
          };

          // 날짜 가독성 변환
          const fmtDate = d => d ? d.split("-").slice(1).join("/") : "";
          
          // 순유동성 지표(Net Liquidity) 조립 로직
          const processedFed = data.liquidity.fed.map(p => ({...p, label: fmtDate(p.date)}));
          const processedTga = data.liquidity.tga.map(p => ({...p, label: fmtDate(p.date)}));
          const processedRrp = data.liquidity.rrp.map(p => ({...p, label: fmtDate(p.date)}));
          
          const processedNet = data.liquidity.fed.map((p, i) => {
            const tgaVal = data.liquidity.tga[i] ? data.liquidity.tga[i].value : 0;
            const rrpVal = data.liquidity.rrp[i] ? data.liquidity.rrp[i].value : 0;
            // Net Liquidity = Fed Total Assets - TGA - RRP
            const netVal = parseFloat((p.value - (tgaVal / 1000) - (rrpVal / 1000)).toFixed(3));
            return { date: p.date, label: fmtDate(p.date), value: netVal };
          });

          const currentFed = data.liquidity.fed[data.liquidity.fed.length - 1].value;
          const currentTga = data.liquidity.tga[data.liquidity.tga.length - 1].value;
          const currentRrp = data.liquidity.rrp[data.liquidity.rrp.length - 1].value;
          const currentNet = parseFloat((currentFed - (currentTga / 1000) - (currentRrp / 1000)).toFixed(3));

          // 유동성 상태 진단 신호
          let statusSignal = { text: "양적완화(QE) 상태유지", color: THEME.green, desc: "시중에 유동성이 넉넉하게 유지되어 자산 시장 전반에 우호적인 환경입니다." };
          if (currentNet < 5.5) {
            statusSignal = { text: "양적긴축(QT) 경계령", color: THEME.red, desc: "유동성 총합이 줄어들고 있어 증시 및 고위험 자산의 하방 압력이 높아질 수 있습니다." };
          } else if (currentNet >= 5.5 && currentNet < 5.75) {
            statusSignal = { text: "유동성 중립 통로", color: THEME.yellow, desc: "자금 유출입이 균형을 이룬 상태로, 거시 경제지표 발표에 따른 눈치보기가 심화됩니다." };
          }

          return (
            <div class="max-w-4xl mx-auto p-4 min-h-screen pb-12">
              
              <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-5 mb-6 gap-4">
                <div>
                  <h1 class="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                    📊 <span class="bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Macro Liquidity Hub</span>
                  </h1>
                  <p class="text-xs text-slate-400 mt-1">최종 갱신: <span class="text-blue-400 font-mono font-medium">{data.lastUpdated}</span></p>
                </div>
                
                <button 
                  onClick={handleRefreshAPI}
                  disabled={isUpdating}
                  class={`flex items-center gap-2 px-4 py-2 rounded-lg font-bold text-xs border tracking-wide transition-all ${
                    isUpdating 
                      ? 'bg-slate-800 border-slate-700 text-slate-500 cursor-not-allowed' 
                      : 'bg-[#122035] border-blue-500/30 hover:border-blue-500 text-blue-400 hover:bg-blue-500/10 active:scale-95'
                  }`}
                >
                  <svg class={`w-3.5 h-3.5 ${isUpdating ? 'animate-spin' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18" />
                  </svg>
                  {isUpdating ? "실시간 연동중..." : "실시간 API 데이터 업데이트"}
                </button>
              </div>

              <div class="mb-6">
                <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase mb-3 flex items-center gap-1.5">
                  <span class="inline-block w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                  실시간 시장 현황 & 야간 선물 지수
                </h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                  {Object.entries(data.market).map(([ticker, item]) => {
                    const isPlus = item.pct >= 0;
                    return (
                      <div key={ticker} class="bg-[#0b1523] border border-slate-800 rounded-xl p-3.5 flex flex-col justify-between hover:border-slate-700 transition-colors">
                        <div>
                          <div class="flex items-center justify-between gap-1 mb-1.5">
                            <span class="text-[11px] font-bold text-slate-400 truncate">{item.flag} {item.name}</span>
                          </div>
                          <div class="text-lg font-mono font-black text-white">{item.price.toLocaleString()}</div>
                        </div>
                        <div class={`text-xs font-bold mt-2 font-mono flex items-center gap-1 ${isPlus ? 'text-emerald-400' : 'text-rose-400'}`}>
                          <span>{isPlus ? '▲' : '▼'}</span>
                          <span>{Math.abs(item.chg)}</span>
                          <span class="text-[10px] opacity-80">({isPlus ? '+' : ''}{item.pct}%)</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div class="bg-[#0b1523] border border-slate-800 rounded-xl p-5 mb-6">
                <div class="flex items-start justify-between border-b border-slate-800/60 pb-4 mb-4">
                  <div>
                    <div class="text-[10px] font-bold text-slate-400 tracking-wider uppercase">CURRENT NET LIQUIDITY INDEX</div>
                    <div class="text-3xl font-black font-mono tracking-tight mt-1" style={{ color: statusSignal.color }}>
                      ${currentNet.toFixed(3)}T
                    </div>
                  </div>
                  <div class="px-3 py-1.5 rounded-lg text-xs font-extrabold tracking-wide" style={{ backgroundColor: `${statusSignal.color}15`, color: statusSignal.color }}>
                    {statusSignal.text}
                  </div>
                </div>
                <p class="text-xs text-slate-300 leading-relaxed font-medium">
                  📌 <span class="text-white font-bold">현재 시장 유동성 진단:</span> {statusSignal.desc} 연준 총자산에서 TGA(재무부 일반계정) 잔고와 RRP(역레포) 흡수 자금을 제외한 실질 유동성 지표입니다.
                </p>
              </div>

              <div class="space-y-4">
                <h2 class="text-xs font-bold text-slate-400 tracking-wider uppercase mb-1">유동성 핵심 4대 지표 추이 리포트</h2>
                
                {[
                  {
                    title: "순수 시장 실질 유동성 총합 ($T)",
                    curValue: `$${currentNet.toFixed(3)}T`,
                    data: processedNet,
                    color: statusSignal.color,
                    isMain: true,
                    domain: [6.1, 6.7],
                    definition: "연준이 공급한 총 돈에서 정부가 묶어둔 돈(TGA)과 은행들이 안전하게 파킹해둔 돈(RRP)을 뺀 지표입니다.",
                    qeEffect: "증시 및 가상자산 등 위험 자산 상승의 다이렉트 유동성 엔진 역할을 수행합니다.",
                    qtEffect: "지표 감소 시 증시가 밸류에이션 부담을 느끼며 하방 변동성이 커지는 경향이 있습니다."
                  },
                  {
                    title: "연준 총자산 - Federal Reserve Total Assets ($T)",
                    curValue: `$${currentFed.toFixed(3)}T`,
                    data: processedFed,
                    color: THEME.blue,
                    domain: [6.4, 6.8],
                    definition: "미국 중앙은행(Fed)이 보유한 자산의 총합으로, 연준의 대차대조표 크기 자체를 의미합니다.",
                    qeEffect: "국채 및 MBS 매입을 통해 자산이 늘어나는 구간을 '양적완화(QE)'라고 부릅니다.",
                    qtEffect: "만기 자산을 재투자하지 않고 소멸시키는 '양적긴축(QT)' 구간에는 이 자산이 우하향합니다."
                  },
                  {
                    title: "재무부 일반 계정 잔고 - TGA Balance ($B)",
                    curValue: `${currentTga} $B`,
                    data: processedTga,
                    color: THEME.yellow,
                    domain: [700, 1000],
                    definition: "미국 재무부가 연방준비은행에 개설해둔 일종의 정부 마이너스 통장/일반 예금 계좌입니다.",
                    qeEffect: "정부가 국채를 발행하거나 세금을 거둬 TGA 계좌에 돈을 쌓으면 시장 자금을 흡수(긴축 효과)하게 됩니다.",
                    qtEffect: "반대로 재무부가 재정 지출을 늘려 TGA 잔고를 헐어 시중에 풀면 시장 유동성이 공급되는 효과가 납니다."
                  },
                  {
                    title: "연준 역레포 잔고 - Overnight Reverse Repurchase ($B)",
                    curValue: `${currentRrp} $B`,
                    data: processedRrp,
                    color: THEME.purple,
                    domain: [0, 2.5],
                    definition: "시중 은행이나 MMF(정부기금)가 갈 곳 없는 단기 잉여 자금을 연준에 맡기고 이자를 받는 창구입니다.",
                    qeEffect: "역레포 잔고가 감소한다는 것은 연준에 묶여있던 휴면 자금이 민간 금융시장으로 재유출됨을 의미합니다.",
                    qtEffect: "역레포 잔고가 급격히 늘어나면 시중 유동성이 연준으로 회수되어 시장 자금이 빡빡해질 수 있습니다."
                  }
                ].map((item) => (
                  <div key={item.title} class={`bg-[#0b1523] border rounded-xl p-5 ${item.isMain ? 'border-slate-700 bg-gradient-to-b from-[#0b1523] to-[#0c1a2e]' : 'border-slate-800'}`}>
                    
                    <div class="flex justify-between items-start mb-3">
                      <div>
                        <h3 class="text-sm font-bold text-white flex items-center gap-2">
                          <span class="w-1.5 h-3 rounded-full" style={{ backgroundColor: item.color }}></span>
                          {item.title}
                        </h3>
                      </div>
                      <div class="text-base font-mono font-black" style={{ color: item.color }}>{item.value || item.curValue}</div>
                    </div>

                    <div class="bg-[#040c14]/60 border border-slate-800/80 rounded-lg p-3 text-[12px] text-slate-300 leading-relaxed mb-4 space-y-1.5">
                      <div>💡 <span class="text-slate-400 font-semibold">지표 정의:</span> {item.definition}</div>
                      <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2 pt-2 border-t border-slate-800/40">
                        <div class="flex items-start gap-1.5 text-emerald-400/90">
                          <span class="mt-0.5">🟢</span>
                          <span><strong class="text-slate-300">확장(QE) 효과:</strong> {item.qeEffect}</span>
                        </div>
                        <div class="flex items-start gap-1.5 text-rose-400/95">
                          <span class="mt-0.5">🔴</span>
                          <span><strong class="text-slate-300">긴축(QT) 효과:</strong> {item.qtEffect}</span>
                        </div>
                      </div>
                    </div>

                    <div class="w-100% h-[160px] mt-2">
                      <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={item.data} margin={{ top: 10, right: 10, left: -25, bottom: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" stroke="#14243b" vertical={false} />
                          <XAxis dataKey="label" tick={{ fill: THEME.muted, fontSize: 10 }} tickLine={false} axisLine={false} />
                          <YAxis domain={item.domain} tick={{ fill: THEME.muted, fontSize: 10 }} tickLine={false} axisLine={false} />
                          <Tooltip 
                            contentStyle={{ backgroundColor: THEME.panel2, borderColor: THEME.border, borderRadius: 8, fontSize: 11 }}
                            labelStyle={{ color: '#fff', fontWeight: 'bold' }}
                          />
                          <Line 
                            type="monotone" 
                            dataKey="value" 
                            stroke={item.color} 
                            strokeWidth={2.5} 
                            dot={{ r: 3, fill: item.color, strokeWidth: 0 }} 
                            activeDot={{ r: 5 }}
                            isAnimationActive={false} 
                          />
                        </LineChart>
                      </ResponsiveContainer>
                    </div>

                  </div>
                ))}
              </div>

            </div>
          );
        }

        const container = document.getElementById('root');
        if (container) {
          ReactDOM.createRoot(container).render(<Dashboard />);
        }
      };

      if (document.readyState === "complete") {
        initDashboard();
      } else {
        window.addEventListener("load", initDashboard);
      }
    </script>
</body>
</html>

name: Daily Dashboard Refresh

on:
  schedule:
    - cron: "0 21 * * *"  # KST 06:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard data from archive
        run: python Stock_Managment/scripts/build_dashboard.py

      - name: Generate progress report
        run: python Stock_Managment/scripts/generate_progress_report.py --step3-done --step4-done --message "GitHub Actions 자동 갱신" --no-open

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Stock_Managment/public/data/dashboard.json
          git add Progress_Report.html Progress_Report_*.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: auto-refresh dashboard [skip ci]"
          git push

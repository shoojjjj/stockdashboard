name: Daily Dashboard Refresh

on:
  schedule:
    # UTC 21:00 = KST 06:00
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dashboard data
        run: |
          cd Stock_Managment
          python scripts/build_dashboard.py

      - name: Install and build Next.js
        run: |
          cd Stock_Managment
          npm ci
          npm run build

      # Vercel 연동 시: dashboard.json 커밋 또는 Vercel CLI 배포
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Stock_Managment/public/data/dashboard.json || true
          git diff --staged --quiet || git commit -m "chore: auto-refresh dashboard data"
          git push || true
